<!doctype html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Control de stock e inventario 100% offline. Sin nube ni cuentas.">
  <title>Control de Inventario</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4f6ef7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#06091a" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="icons/icono.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icono-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inventario">

  <link rel="preload" href="vendor/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="vendor/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark" id="brand-mark">I</span>
        <img id="empresa-logo" class="brand-logo" alt="" hidden>
        <span class="brand-text">
          <span id="empresa-nombre" class="brand-name">Inventario</span>
          <span class="brand-sub">Control de stock</span>
        </span>
      </div>

      <nav class="nav" aria-label="Secciones">
        <a class="nav-link" data-ruta="inicio" href="#/inicio">
          <span class="nav-ico" data-ico="inicio"></span><span class="nav-txt">Inicio</span>
        </a>
        <a class="nav-link" data-ruta="articulos" href="#/articulos">
          <span class="nav-ico" data-ico="paquete"></span><span class="nav-txt">Artículos</span>
        </a>
        <a class="nav-link" data-ruta="compras" href="#/compras">
          <span class="nav-ico" data-ico="compras"></span><span class="nav-txt">Compras</span>
        </a>
        <a class="nav-link" data-ruta="proveedores" href="#/proveedores">
          <span class="nav-ico" data-ico="proveedor"></span><span class="nav-txt">Proveedores</span>
        </a>
        <a class="nav-link" data-ruta="historial" href="#/historial">
          <span class="nav-ico" data-ico="historial"></span><span class="nav-txt">Historial</span>
        </a>
        <a class="nav-link" data-ruta="reportes" href="#/reportes" data-admin-only>
          <span class="nav-ico" data-ico="reportes"></span><span class="nav-txt">Reportes</span>
        </a>
        <a class="nav-link" data-ruta="respaldo" href="#/respaldo" data-admin-only>
          <span class="nav-ico" data-ico="respaldo"></span><span class="nav-txt">Respaldo</span>
        </a>
        <a class="nav-link" data-ruta="ajustes" href="#/ajustes" data-admin-only>
          <span class="nav-ico" data-ico="ajustes"></span><span class="nav-txt">Ajustes</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <button class="ayuda-btn" id="ayuda-btn" type="button" aria-label="Centro de ayuda">
          <span data-ico="ayuda"></span>
        </button>
        <button class="tema-btn" id="tema-btn" type="button" aria-label="Cambiar tema">
          <span data-ico="ajustes"></span><span class="tema-txt">Tema</span>
        </button>
        <span class="ver">Offline · v3 · <span id="rol-display" style="font-weight:700">Admin</span></span>
      </div>
    </aside>

    <main id="vista" class="main" tabindex="-1">
      <div class="cargando"><span class="spinner"></span> Cargando…</div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
